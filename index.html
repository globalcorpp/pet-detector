<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Demo</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {

            background: #F7F5F2;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
        }

        .container {

            width: 420px;

            text-align: center;
        }

        h1 {

            margin-bottom: 30px;

            color: #333;
        }

        .buttons {

            display: flex;

            justify-content: center;

            gap: 15px;

            margin-bottom: 25px;
        }

        .btn {

            border: none;

            padding: 14px 28px;

            border-radius: 12px;

            color: white;

            font-size: 18px;

            cursor: pointer;

            transition: .3s;

            box-shadow: 0 10px 25px rgba(0, 0, 0, .1);
        }

        .btn:hover {

            transform: translateY(-3px);
        }

        .photo {

            background: #4F8EF7;
        }

        .video {

            background: #59B86C;
        }

        #webcam-container {

            width: 300px;

            height: 300px;

            margin: auto;

            overflow: hidden;

            border-radius: 18px;

            background: white;

            box-shadow: 0 15px 35px rgba(0, 0, 0, .12);
        }

        #webcam-container canvas {

            width: 100% !important;

            height: 100% !important;

        }

        #result-bar {

            margin-top: 25px;

            background: linear-gradient(135deg, #5E9CFF, #D66BEA);

            color: white;

            border-radius: 18px;

            padding: 18px;

            display: flex;

            justify-content: space-between;

            align-items: center;

            font-size: 28px;

            font-weight: bold;

            box-shadow: 0 15px 30px rgba(0, 0, 0, .15);

        }
    </style>
</head>

<body>


    <div class="container">

        <h1>🐶🐱 Dog & Cat Detector</h1>

        <div class="buttons">
            <button class="btn photo" onclick="init()">
                📷 Photo
            </button>

            <button class="btn video" onclick="init()">
                🎥 Video
            </button>
        </div>

        <div id="webcam-container"></div>

        <div id="result-bar">
            <span id="animal">...</span>
            <span id="percent">0%</span>
        </div>

    </div>

    <!-- <div>Teachable Machine Image Model</div>

    <button onclick="init()">Start</button>

    <div id="webcam-container"></div>
    <div id="label-container"></div> -->

    <script>
        const URL = "./my_model/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            if (model) return;
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(200, 200, true);
            await webcam.setup();
            await webcam.play();

            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);

            labelContainer = document.getElementById("label-container");

            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {

            const prediction = await model.predict(webcam.canvas);

            const best = prediction.reduce((a, b) =>

                a.probability > b.probability ? a : b

            );

            document.getElementById("animal").innerText =
                best.className;

            document.getElementById("percent").innerText =
                (best.probability * 100).toFixed(1) + "%";

        }
    </script>

</body>

</html>
