<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>🐶🐱 Dog & Cat Detector</h1>

        <div class="buttons">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            
            <button class="btn photo" onclick="triggerImageUpload()">
                📷 Photo
            </button>

            <button class="btn video" onclick="initWebcam()">
                🎥 Video
            </button>
        </div>

        <div id="display-container">
            <div id="webcam-container"></div>
            <img id="image-preview" src="#" alt="Uploaded Preview" style="display: none;" />
        </div>

        <div id="result-bar">
            <span id="animal">...</span>
            <span id="percent">0%</span>
        </div>
    </div>

    <script>
        const URL = "./my_model/";
        let model, webcam, maxPredictions;
        let isWebcamActive = false;

        // تابع کمکی برای بارگذاری اولیه مدل (در صورت بارگذاری نشدن)
        async function loadModel() {
            if (!model) {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
            }
        }

        // --- بخش مربوط به وبکم (Video) ---
        async function initWebcam() {
            await loadModel();
            
            // مخفی کردن عکس قبلی در صورت وجود
            document.getElementById("image-preview").style.display = "none";
            const webcamContainer = document.getElementById("webcam-container");
            webcamContainer.style.display = "block";

            if (isWebcamActive) return;

            webcam = new tmImage.Webcam(300, 300, true); // ابعاد متناسب با کانتینر
            await webcam.setup();
            await webcam.play();
            
            isWebcamActive = true;
            window.requestAnimationFrame(loop);

            webcamContainer.innerHTML = ""; // پاکسازی کانتینر
            webcamContainer.appendChild(webcam.canvas);
        }

        async function loop() {
            if (!isWebcamActive) return;
            webcam.update();
            await predict(webcam.canvas);
            window.requestAnimationFrame(loop);
        }

        // --- بخش مربوط به آپلود عکس (Photo) ---
        function triggerImageUpload() {
            // شبیه‌سازی کلیک روی اینپوت مخفی فایل
            document.getElementById('file-input').click();
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // متوقف کردن وبکم در صورت فعال بودن
            if (isWebcamActive && webcam) {
                await webcam.stop();
                isWebcamActive = false;
                document.getElementById("webcam-container").style.display = "none";
            }

            await loadModel();

            const imgElement = document.getElementById("image-preview");
            imgElement.style.display = "block";

            // خواندن فایل عکس و نمایش آن
            const reader = new FileReader();
            reader.onload = function (e) {
                imgElement.src = e.target.result;
                
                // بعد از بارگذاری کامل عکس، تشخیص را انجام بده
                imgElement.onload = async function() {
                    await predict(imgElement);
                }
            }
            reader.readAsDataURL(file);
        }

        // --- تابع مشترک تشخیص و پردازش (Prediction) ---
        async function predict(inputElement) {
            if (!model) return;

            const prediction = await model.predict(inputElement);
            
            // پیدا کردن بهترین پیش‌بینی بر اساس بیشترین احتمال
            const best = prediction.reduce((a, b) => a.probability > b.probability ? a : b);

            document.getElementById("animal").innerText = best.className;
            document.getElementById("percent").innerText = (best.probability * 100).toFixed(1) + "%";
        }
    </script>
</body>
</html>
